name: Cross Compile Go Project

on:
  pull_request:
    types: [opened, synchronize]
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build:
    name: Build on ${{ matrix.os }} for ${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            goarch: amd64
          - os: linux
            goarch: arm64
          - os: darwin
            goarch: amd64
          - os: darwin
            goarch: arm64
          - os: windows
            goarch: amd64
          - os: android
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21.1'
          cache: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install Quasar CLI and dependencies
        working-directory: frontend
        run: |
          npm install -g @quasar/cli
          npm ci

      - name: Build Quasar Project
        working-directory: frontend
        run: quasar build

      - name: Cache Android NDK
        if: matrix.os == 'android'
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: ${{ github.workspace }}/android-ndk-r21e
          key: ${{ runner.os }}-android-ndk-r21e

      - name: Download and setup Android NDK
        if: matrix.os == 'android' && steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip
          wget https://dl.google.com/android/repository/android-ndk-r21e-linux-x86_64.zip -O ndk.zip
          unzip -q ndk.zip

      - name: Export Android NDK environment
        if: matrix.os == 'android'
        run: |
          echo "ANDROID_NDK_HOME=${{ github.workspace }}/android-ndk-r21e" >> "$GITHUB_ENV"

      - name: Create output directory
        run: mkdir -p output

      - name: Compile Go for target
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          if [ "$GOOS" = "windows" ]; then
            OUTPUT="output/gensokyo-kook-${{ matrix.os }}-${{ matrix.goarch }}.exe"
          else
            OUTPUT="output/gensokyo-kook-${{ matrix.os }}-${{ matrix.goarch }}"
          fi

          go build -trimpath -ldflags="-s -w" -o "$OUTPUT"

      - name: Compress executable files with UPX
        if: matrix.os != 'darwin' && !(matrix.os == 'android' && matrix.goarch == 'arm64')
        run: |
          sudo apt-get update
          sudo apt-get install -y upx

          if [ "${{ matrix.os }}" = "windows" ]; then
            FILENAME="output/gensokyo-kook-${{ matrix.os }}-${{ matrix.goarch }}.exe"
          else
            FILENAME="output/gensokyo-kook-${{ matrix.os }}-${{ matrix.goarch }}"
          fi

          upx --best --lzma "$FILENAME"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gensokyo-kook-${{ matrix.os }}-${{ matrix.goarch }}
          path: output/gensokyo-kook-${{ matrix.os }}-${{ matrix.goarch }}${{ matrix.os == 'windows' && '.exe' || '' }}
          if-no-files-found: error
          compression-level: 0

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: output
          merge-multiple: true

      - name: Show downloaded files
        run: find output -maxdepth 2 -type f | sort

      - name: Create GitHub Release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: false
          files: output/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
